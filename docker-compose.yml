services:
  postgres:
    image: postgres:16-alpine
    container_name: crossfit-avignon-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crossfit_avignon
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres.txt:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432" 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crossfit_avignon"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/thomasboutelier/crossfit-avignon-api:latest
    container_name: crossfit-avignon-api
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/crossfit_avignon
      ENVIRONMENT: production
      BACKEND_CORS_ORIGINS: '["https://crossfit-avignon.fr", "https://www.crossfit-avignon.fr", "http://127.0.0.1:8080"]'
      SECRET_KEY: "b9a3c1e577b2783169da9d325e79105385b50572d1f1b824d864dd7e6d5f2f1c"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: crossfit-avignon-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      - api

  certbot:
    image: certbot/certbot
    container_name: crossfit-avignon-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

volumes:
  postgres_data:
  certbot_www:
  certbot_conf: